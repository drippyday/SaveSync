# GBAsync 3DS — copy to sdmc:/3ds/gba-sync/config.ini
# See README_CONFIG.md in this folder for every key.

[server]
url=http://10.0.0.151:8080
api_key=change-me

[sync]
# normal | vc
mode=normal
# mode=normal: primary save folder when not using multi-root
save_dir=sdmc:/3ds/open_agb_firm/saves/
# Checkpoint / VC exports when mode=vc
vc_save_dir=sdmc:/3ds/Checkpoint/saves

# Multi-root (if any is set, save_dir is ignored):
#gba_save_dir=sdmc:/roms/gba/saves
#nds_save_dir=sdmc:/roms/nds/saves
#gb_save_dir=sdmc:/roms/gb/saves

# Comma-separated game_id skipped on Auto (R toggles in Save viewer)
#locked_ids=my-hack-title,other-game

[rom]
rom_dir=sdmc:/roms/gba
rom_extension=.gba

#gba_rom_dir=sdmc:/roms/gba
#nds_rom_dir=sdmc:/roms/nds
#gb_rom_dir=sdmc:/roms/gb
#gba_rom_extension=.gba
#nds_rom_extension=.nds
#gb_rom_extension=.gb,.gbc
