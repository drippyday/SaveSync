# GBAsync Switch — copy to sdmc:/switch/gba-sync/config.ini
# See README_CONFIG.md in this folder for every key.

[server]
url=http://10.0.0.151:8080
api_key=change-me

[sync]
# normal | vc
mode=normal
# Legacy single save root (used if gba_save_dir / nds_save_dir / gb_save_dir are all unset)
save_dir=sdmc:/mGBA
# mode=vc: scan this folder instead of save_dir
#vc_save_dir=sdmc:/switch/Checkpoint/...

# Multi-root (if any is set, save_dir is ignored):
#gba_save_dir=sdmc:/mGBA
#nds_save_dir=sdmc:/retroarch/saves/Nintendo - Nintendo DS
#gb_save_dir=sdmc:/roms/gb/saves

# true | false — include NDS .sav in nds_save_dir (default true)
#sync_nds_saves=true

# Comma-separated filename substrings to skip
#skip_save_patterns=somehack,backup

# Comma-separated game_id skipped on Auto (R toggles in Save viewer)
#locked_ids=my-hack-title,other-game

[rom]
# With legacy save_dir:
rom_dir=sdmc:/roms/gba
rom_extension=.gba

# Multi-root ROM paths (pair with gba_save_dir / nds_save_dir / gb_save_dir):
#gba_rom_dir=sdmc:/roms/gba
#nds_rom_dir=sdmc:/roms/nds
#gb_rom_dir=sdmc:/roms/gb
#gba_rom_extension=.gba
#nds_rom_extension=.nds
#gb_rom_extension=.gb,.gbc
