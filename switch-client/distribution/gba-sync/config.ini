# GBAsync Switch — copy this folder to sdmc:/switch/gba-sync/
# Edit values below. See README.md in this folder for every key.

[server]
url=http://10.0.0.151:8080
api_key=change-me

[sync]
# normal = use save_dir and/or multi-root dirs | vc = use vc_save_dir only
mode=normal

# Single-root layout (GBA): one save folder + [rom] below
save_dir=sdmc:/mGBA

# Uncomment for Checkpoint / VC-style single root:
# mode=vc
# vc_save_dir=sdmc:/path/to/vc/saves

# Multi-root layout (optional): set one or more; when any is set, gba_/nds_/gb_ pairs are used
# gba_save_dir=sdmc:/mGBA
# nds_save_dir=sdmc:/path/to/nds/saves
# gb_save_dir=sdmc:/path/to/gb/saves
# sync_nds_saves=true
# skip_save_patterns=backup,temp

# Optional: comma-separated game_id list skipped on Auto (viewer can rewrite)
# locked_ids=my-hack-title,other-game

[rom]
# Single-root ROM lookup (when not using gba_/nds_/gb_ save dirs above)
rom_dir=sdmc:/roms/gba
rom_extension=.gba

# Multi-root ROM dirs (optional; pair with gba_save_dir / nds_save_dir / gb_save_dir)
# gba_rom_dir=sdmc:/roms/gba
# nds_rom_dir=sdmc:/roms/nds
# gb_rom_dir=sdmc:/roms/gb
# gba_rom_extension=.gba
# nds_rom_extension=.nds
# gb_rom_extension=.gb
